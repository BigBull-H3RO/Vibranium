name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and build
        run: ./gradlew --no-daemon test build

      - name: Upload jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibranium-jars
          path: build/libs/*.jar
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/**
          if-no-files-found: ignore

  datagen-drift:
    name: Datagen Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run data generation
        run: ./gradlew --no-daemon runData

      - name: Check for generated resource changes
        run: |
          if ! git diff --quiet -- src/generated/resources; then
            echo "::error::Datagen output changed. Run './gradlew runData' locally and commit the changes in src/generated/resources."
            git --no-pager diff -- src/generated/resources > datagen.diff
            exit 1
          fi

      - name: Upload datagen diff (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: datagen-diff
          path: datagen.diff
          if-no-files-found: ignore
