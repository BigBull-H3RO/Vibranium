name: Release

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]')) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Guard against merge commits from pull requests
        if: github.event_name == 'push'
        run: |
          parent_count=$(git rev-list --parents -n 1 "$GITHUB_SHA" | awk '{print NF-1}')
          if [ "$parent_count" -ne 1 ]; then
            echo "::error::Release via PR merge commit is blocked. Create a dedicated direct commit on main with '[release]'."
            exit 1
          fi

      - name: Resolve version and release tag from gradle.properties
        id: release_tag
        run: |
          mod_version=$(grep '^mod_version=' gradle.properties | head -n 1 | cut -d '=' -f 2- | tr -d '\r' | xargs)
          if [ -z "$mod_version" ]; then
            echo "::error::Could not read mod_version from gradle.properties"
            exit 1
          fi
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$mod_version" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag if missing
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag '$RELEASE_TAG' already exists. Reusing it."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "oracle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew --no-daemon build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Vibranium ${{ steps.release_tag.outputs.mod_version }}
          files: build/libs/*.jar
          generate_release_notes: true